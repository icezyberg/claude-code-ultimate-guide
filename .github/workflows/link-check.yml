name: Link Check

on:
  schedule:
    # Run on the 1st of each month at 08:00 UTC
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links in guide markdown files
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --accept 200,206,429,302
            --root-dir "$(pwd)"
            --exclude "^mailto:"
            --exclude "^#"
            --exclude "^file://"
            --exclude "^https://twitter\\.com"
            --exclude "^https://x\\.com"
            --exclude "^https://linkedin\\.com"
            --exclude "^https://www\\.linkedin\\.com"
            --exclude "^https://localhost"
            './guide/**/*.md'
            './examples/**/*.md'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected in guide markdown"
          content-filepath: ./lychee/out.md
          labels: |
            bug
            broken-links
